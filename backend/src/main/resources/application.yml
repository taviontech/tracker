spring:
  application:
    name: tracker-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tracker}
    username: ${SPRING_DATASOURCE_USERNAME:tracker}
    password: ${SPRING_DATASOURCE_PASSWORD:tracker_secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 105MB
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      "mail.smtp.auth": "true"
      "mail.smtp.starttls.enable": "true"
      "mail.smtp.starttls.required": "true"
      "mail.smtp.ssl.trust": "smtp.gmail.com"

server:
  port: 8080
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET:supersecretjwtkeyfrontrackerplatform2024changeinprod}
  expiry-hours: ${JWT_EXPIRY_HOURS:24}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

frontend:
  url: ${FRONTEND_URL:http://localhost:3000}

contact:
  recipient-email: ${CONTACT_RECIPIENT_EMAIL:support@trackerhub.com}
  sender-name: TrackerHub

wallets:
  btc-mainnet: ${WALLET_BTC_MAINNET:bc1qdce7ka2gjd9f5qsaeg4fhk5k0njfx6uc8tetxk}
  eth-erc20: ${WALLET_ETH_ERC20:0x848728D96F1F7C53C5D96a708AF9ce0031dbFEcF}
  eth-bep20: ${WALLET_ETH_BEP20:0x848728D96F1F7C53C5D96a708AF9ce0031dbFEcF}
  usdt-erc20: ${WALLET_USDT_ERC20:0x848728D96F1F7C53C5D96a708AF9ce0031dbFEcF}
  usdt-trc20: ${WALLET_USDT_TRC20:TF5NCzHJPe87C5BvgTMrk6dEh6Xa9oHXjr}
  usdt-bep20: ${WALLET_USDT_BEP20:0x848728D96F1F7C53C5D96a708AF9ce0031dbFEcF}
  sol-mainnet: ${WALLET_SOL_MAINNET:9XeLwxvocM9yxpnqhGgGqtJEaCPgPPnhoNBTvrAPjWXV}
  ton-mainnet: ${WALLET_TON_MAINNET:UQBp_nWRaq_LZGD6c6uat6VR1adnarneYMj6KFlKZKKVXlMG}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    try-it-out-enabled: true
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

uploads:
  dir: ${UPLOADS_DIR:/app/uploads}

api:
  base-url: ${API_BASE_URL:http://localhost:8080}

logging:
  level:
    com.track: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
