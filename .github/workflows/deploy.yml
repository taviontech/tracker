name: CI/CD

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Write tfvars
        run: printf '%s' "$TF_VARS" > terraform.tfvars
        env:
          TF_VARS: ${{ secrets.TF_VARS }}

      - name: Terraform Init
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -var-file=terraform.tfvars
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  deploy:
    name: Deploy App
    needs: terraform
    runs-on: ubuntu-latest

    steps:
      - name: Wait for EC2 to be ready
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$EC2_SSH_KEY" | tr -d '\r' > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          for i in $(seq 1 20); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
                -i /tmp/deploy_key ubuntu@"$EC2_HOST" \
                'docker info >/dev/null 2>&1'; then
              echo "EC2 is ready"
              exit 0
            fi
            echo "Waiting... ($i/20)"
            sleep 15
          done

          echo "EC2 did not become ready in time"
          exit 1

      - name: Write .env from SSM
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          aws ssm get-parameters-by-path \
            --region eu-west-1 \
            --path /tracker \
            --with-decryption \
            --output json \
          | jq -r '.Parameters[] | ((.Name | split("/") | last) + "=" + .Value)' \
          | sort > /tmp/prod.env

          echo "$EC2_SSH_KEY" | tr -d '\r' > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            /tmp/prod.env ubuntu@"$EC2_HOST":/tmp/prod.env

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GH_TOKEN
          script: |
            set -euo pipefail
            APP_DIR=/home/ubuntu/tracker

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone https://oauth2:${GH_TOKEN}@github.com/taviontech/tracker.git "$APP_DIR"
            else
              cd "$APP_DIR"
              git remote set-url origin https://oauth2:${GH_TOKEN}@github.com/taviontech/tracker.git
              git checkout -- . 2>/dev/null || true
              git pull origin master
            fi

            cd "$APP_DIR"

            cp /tmp/prod.env .env

            docker compose -f docker-compose.aws.yml up --build -d --remove-orphans
            docker image prune -f
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}