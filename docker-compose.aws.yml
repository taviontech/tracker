version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tracker}
      POSTGRES_USER: ${POSTGRES_USER:-tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracker_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracker} -d ${POSTGRES_DB:-tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracker-net

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tracker-backend
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-eu-west-1}
        awslogs-group: /tracker/backend
        awslogs-create-group: "true"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-tracker}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-tracker}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-tracker_secret}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      FRONTEND_URL: ${FRONTEND_URL}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      CONTACT_RECIPIENT_EMAIL: ${CONTACT_RECIPIENT_EMAIL:-}
      WALLET_BTC_MAINNET: ${WALLET_BTC_MAINNET:-}
      WALLET_ETH_ERC20: ${WALLET_ETH_ERC20:-}
      WALLET_ETH_BEP20: ${WALLET_ETH_BEP20:-}
      WALLET_USDT_ERC20: ${WALLET_USDT_ERC20:-}
      WALLET_USDT_TRC20: ${WALLET_USDT_TRC20:-}
      WALLET_USDT_BEP20: ${WALLET_USDT_BEP20:-}
      WALLET_SOL_MAINNET: ${WALLET_SOL_MAINNET:-}
      WALLET_TON_MAINNET: ${WALLET_TON_MAINNET:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - tracker-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: tracker-frontend
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: ${AWS_REGION:-eu-west-1}
        awslogs-group: /tracker/frontend
        awslogs-create-group: "true"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      BACKEND_INTERNAL_URL: http://backend:8080
    ports:
      - "3000:3000"
    networks:
      - tracker-net

volumes:
  postgres_data:
  uploads_data:

networks:
  tracker-net:
    driver: bridge